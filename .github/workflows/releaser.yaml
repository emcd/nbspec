name: release

on:
  push:
    tags: ['v[0-9]+.*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip actual publishing (test build only)'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:

  initialize:
    uses: ./.github/workflows/core--initializer.yaml

  test:
    needs: [initialize]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.initialize.outputs.platforms) }}
        exclude: ${{ fromJSON(needs.initialize.outputs.matrix-exclusions) }}
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure git for nb
        # Mirrors the tester setup so the lifecycle integration test
        # (#[cfg(unix)]) has nb installed and git identity pre-set
        # before `cargo test --release`. Without this, the tag
        # release would fail the test job on Linux / Linux-arm /
        # macOS runners.
        run: |
          git config --global user.name "nbspec CI"
          git config --global user.email "nbspec-ci@users.noreply.github.com"
          git config --global init.defaultBranch master

      - name: Install nb
        run: npm install -g nb.sh@7.24.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        if: matrix.platform == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        if: matrix.platform == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

  publish-crates-io:
    if: ${{ !inputs.dry-run && startsWith(github.ref, 'refs/tags/') }}
    needs: [test]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write  # Required for OIDC token exchange
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1.0.4
        id: auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked
