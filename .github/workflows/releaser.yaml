name: release

on:
  push:
    tags: ['v[0-9]+.*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip actual publishing (test build only)'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:

  initialize:
    uses: ./.github/workflows/core--initializer.yaml

  test:
    needs: [initialize]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.initialize.outputs.platforms) }}
        exclude: ${{ fromJSON(needs.initialize.outputs.matrix-exclusions) }}
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure git for nb
        # Mirrors the tester setup so the lifecycle integration test
        # (#[cfg(unix)]) has nb installed and git identity pre-set
        # before `cargo test --release`. Without this, the tag
        # release would fail the test job on Linux / Linux-arm /
        # macOS runners.
        run: |
          git config --global user.name "nbspec CI"
          git config --global user.email "nbspec-ci@users.noreply.github.com"
          git config --global init.defaultBranch master

      - name: Install nb
        run: npm install -g nb.sh@7.24.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        if: matrix.platform == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        if: matrix.platform == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

  build-binaries:
    needs: [initialize, test]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.initialize.outputs.platforms) }}
        exclude: ${{ fromJSON(needs.initialize.outputs.matrix-exclusions) }}
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release

      - name: Determine Binary Name
        id: binary
        shell: bash
        run: |
          target="${{ fromJSON(needs.initialize.outputs.rust-targets)[matrix.platform] }}"
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            binary_name="nbspec-${target}.exe"
            cp target/release/nbspec.exe "${binary_name}"
          else
            binary_name="nbspec-${target}"
            cp target/release/nbspec "${binary_name}"
          fi
          echo "name=${binary_name}" >>${GITHUB_OUTPUT}

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}
          path: ${{ steps.binary.outputs.name }}

  publish-crates-io:
    if: ${{ !inputs.dry-run && startsWith(github.ref, 'refs/tags/') }}
    needs: [test]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write  # Required for OIDC token exchange
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1.0.4
        id: auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

  publish-github:
    if: ${{ !inputs.dry-run && startsWith(github.ref, 'refs/tags/') }}
    needs: [initialize, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download All Binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Generate Checksums
        working-directory: artifacts
        run: |
          shopt -s nullglob
          sha256sum nbspec-* >SHA256SUMS.txt

      - name: Attest Build Provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/SHA256SUMS.txt
            artifacts/nbspec-*

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --repo '${{ github.repository }}' \
            --generate-notes

      - name: Upload Release Artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload '${{ github.ref_name }}' \
            artifacts/* \
            --repo '${{ github.repository }}'
